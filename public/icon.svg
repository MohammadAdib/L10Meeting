<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="240" r="155" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-dasharray="820 154"/>
  <!-- Inner tick marks -->
  <g stroke="#fff" stroke-width="4" opacity="0.3">
    <line x1="256" y1="100" x2="256" y2="120"/>
    <line x1="256" y1="360" x2="256" y2="380"/>
    <line x1="116" y1="240" x2="136" y2="240"/>
    <line x1="376" y1="240" x2="396" y2="240"/>
  </g>
  <!-- Clock hands -->
  <line x1="256" y1="240" x2="256" y2="160" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="316" y2="210" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="240" r="10" fill="#ff8c42"/>
  <!-- "10" text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="900" letter-spacing="-2" fill="url(#accent)">10</text>
</svg>
